<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family - てんてんのポートフォリオ</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/frame.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/works.css?v=1774314331795">
  <link rel="stylesheet" href="css/button.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/family.css">
  <script src="js/menu.js" defer></script>
  <script src="js/family_slider.js" defer></script>
</head>
<body>

  <!-- 共通ヘッダー＆ハンバーガーメニュー -->
  <header class="site-header">
    <button id="menu-toggle" class="menu-toggle" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- フルスクリーン展開メニュー -->
  <nav id="fullscreen-menu" class="fullscreen-menu">
    <ul class="menu-list">
      <li><a href="index.html">HOME</a></li>
      <li><a href="works.html">CREATE & INVOLVED</a></li>
      <li><a href="family.html">Family</a></li>
    </ul>
  </nav>

  <!-- デジタルノイズ背景 -->
  <div class="noise-bg"></div>
  <!-- ゴスロリ風レース装飾（左右） -->
  <div class="bg-lace lace-left"></div>
  <div class="bg-lace lace-right"></div>

  <div class="works-header-wrapper" style="margin-top: 80px;">
    <div class="works-main-title">
      <h2 class="shadow-text">FAMILY</h2>
      <p class="works-sub-title">うちのペットたち</p>
    </div>
  </div>

  <div class="family-section">
    <!-- むぎ -->
    <div class="family-card ngo-frame">
      <div class="ngo-frame-inner">
        <h3 class="family-name">むぎ <span class="family-breed">シェパード系ミックス</span></h3>
        <div class="family-slider-container" id="slider-mugi">
          <button class="slider-btn prev-btn">‹</button>
          <div class="slider-images">
            <img src="images/mugi_1.jpg" alt="むぎ1" class="slider-img active">
            <img src="images/mugi_2.jpg" alt="むぎ2" class="slider-img">
            <img src="images/mugi_3.jpg" alt="むぎ3" class="slider-img">
          </div>
          <button class="slider-btn next-btn">›</button>
          <div class="slider-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
        <p class="family-desc">おじいちゃんだけど元気。おっとりとした顔をしています。</p>
      </div>
    </div>

    <!-- てん -->
    <div class="family-card ngo-frame">
      <div class="ngo-frame-inner">
        <h3 class="family-name">てん <span class="family-breed">アビシニアン ♂</span></h3>
        <div class="family-image-container">
          <img src="images/ten_1.jpg" alt="てん" class="family-single-img">
        </div>
        <p class="family-desc">本物のてん。運動神経と見た目がいいです。年々おばかになっているよう。</p>
      </div>
    </div>

    <!-- まお -->
    <div class="family-card ngo-frame">
      <div class="ngo-frame-inner">
        <h3 class="family-name">まお <span class="family-breed">アビシニアン？ ♀</span></h3>
        <div class="family-image-container">
          <img src="images/mao_1.jpg" alt="まお" class="family-single-img">
        </div>
        <p class="family-desc">ビビりな性格です。てんちゃんと違ってぽてぽてとしています。</p>
      </div>
    </div>

    <!-- なぎ -->
    <div class="family-card ngo-frame">
      <div class="ngo-frame-inner">
        <h3 class="family-name">なぎ <span class="family-breed">ソマリ ♂</span></h3>
        <div class="family-image-container">
          <img src="images/nagi_1.jpg" alt="なぎ" class="family-single-img">
        </div>
        <p class="family-desc">どんくさいです。長毛種なので毛が絡まってぼさぼさになってしまいます。</p>
      </div>
    </div>
  </div>

</body>
</html>
