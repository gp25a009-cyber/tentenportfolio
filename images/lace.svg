<svg width="240" height="480" viewBox="0 0 240 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- ドロップシャドウでレースに厚みを持たせる -->
    <filter id="lace-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.8"/>
    </filter>

    <!-- ベースとなる細かい六角形（チュール/ネット）パターン -->
    <pattern id="tulle-net" width="8" height="14" patternUnits="userSpaceOnUse" patternTransform="scale(0.8)">
      <path d="M4,0 L8,3.5 L8,10.5 L4,14 L0,10.5 L0,3.5 Z M4,0 L4,14 M0,3.5 L8,10.5 M8,3.5 L0,10.5" fill="none" stroke="rgba(60,60,60,0.5)" stroke-width="0.8"/>
    </pattern>

    <!-- ピコット（外側の小さなループ飾り）-->
    <path id="picot" d="M0,0 C-4,-4 -4,-8 0,-10 C4,-12 8,-8 4,-4 L0,0 Z" fill="none" stroke="rgba(120,120,120,0.9)" stroke-width="2"/>

    <!-- 太糸の薔薇/花のようなギュッと詰まった刺繍モチーフ -->
    <g id="floral-motif" fill="none" stroke="rgba(140,140,140,0.95)" stroke-linecap="round" stroke-linejoin="round">
      <!-- 中心の渦巻き -->
      <path d="M0,0 C-10,-10 -20,10 0,15 C20,20 30,-10 10,-20 C-10,-30 -30,0 -10,25" stroke-width="4"/>
      <!-- 外側の花びら -->
      <path d="M-10,25 C-30,40 -40,10 -25,-10 C-10,-30 0,-40 20,-30 C40,-20 50,10 30,30 C10,50 -20,50 -35,30" stroke-width="3" stroke-dasharray="1 5"/>
      <!-- 葉っぱのような装飾 -->
      <path d="M20,-30 Q40,-50 60,-30 Q40,-10 20,-30 Z" fill="rgba(90,90,90,0.8)" stroke-width="2"/>
      <path d="M-25,-10 Q-50,-30 -30,-50 Q-10,-30 -25,-10 Z" fill="rgba(90,90,90,0.8)" stroke-width="2"/>
      <path d="M-35,30 Q-60,40 -50,60 Q-30,50 -35,30 Z" fill="rgba(90,90,90,0.8)" stroke-width="2"/>
    </g>

    <!-- 唐草のような曲線の連続模様 -->
    <path id="scrollwork" d="M0,0 Q20,20 10,40 T0,80 Q-20,100 -10,120 T0,160 Q20,180 10,200" fill="none" stroke="rgba(120,120,120,0.9)" stroke-width="4"/>

    <!-- 十字架モチーフ（編み込まれたようなステッチ風） -->
    <g id="cross-embroidered" fill="none" stroke="rgba(140,140,140,0.95)" stroke-width="5" stroke-linecap="round">
      <line x1="0" y1="-30" x2="0" y2="40" />
      <line x1="-20" y1="-10" x2="20" y2="-10" />
      <!-- 十字架の周りを囲む細いステッチ -->
      <path d="M-25,-15 L-5,-15 L-5,-35 L5,-35 L5,-15 L25,-15 L25,-5 L5,-5 L5,45 L-5,45 L-5,-5 L-25,-5 Z" stroke-width="1.5" stroke-dasharray="3,3" fill="rgba(40,40,40,0.3)"/>
      <circle cx="0" cy="-30" r="4" fill="rgba(120,120,120,0.9)"/>
      <circle cx="0" cy="40" r="4" fill="rgba(120,120,120,0.9)"/>
      <circle cx="-20" cy="-10" r="4" fill="rgba(120,120,120,0.9)"/>
      <circle cx="20" cy="-10" r="4" fill="rgba(120,120,120,0.9)"/>
    </g>
  </defs>

  <!-- 全体に影を落とすグループ -->
  <g filter="url(#lace-shadow)">
    <!-- クリップパスでメインの波型スカラップに切り抜くための定義 -->
    <clipPath id="scallop-clip">
      <!-- 240x480の空間に、波打つ縁（スカラップ）を描く -->
      <path d="M0,0 L180,0 
               Q210,30 180,60 Q220,90 180,120 
               Q230,150 180,180 Q210,210 180,240
               Q220,270 180,300 Q230,330 180,360
               Q210,390 180,420 Q220,450 180,480
               L0,480 Z" />
    </clipPath>

    <!-- ① チュールネット（網目）のベースを波型に切り抜いて配置 -->
    <rect x="0" y="0" width="240" height="480" fill="url(#tulle-net)" clip-path="url(#scallop-clip)"/>

    <!-- ② 縁を太い糸で縁取る（スカラップのアウトライン） -->
    <path d="M180,0 
             Q210,30 180,60 Q220,90 180,120 
             Q230,150 180,180 Q210,210 180,240
             Q220,270 180,300 Q230,330 180,360
             Q210,390 180,420 Q220,450 180,480" 
          fill="none" stroke="rgba(120,120,120,0.9)" stroke-width="4"/>
          
    <path d="M180,0 
             Q210,30 180,60 Q220,90 180,120 
             Q230,150 180,180 Q210,210 180,240
             Q220,270 180,300 Q230,330 180,360
             Q210,390 180,420 Q220,450 180,480" 
          fill="none" stroke="rgba(70,70,70,0.6)" stroke-width="1.5" stroke-dasharray="2,2" transform="translate(-4, 0)"/>

    <!-- ③ 波型の縁にピコット（極小ループ）を配置 -->
    <use href="#picot" x="195" y="15" transform="rotate(30 195 15)"/>
    <use href="#picot" x="195" y="45" transform="rotate(150 195 45)"/>
    <use href="#picot" x="200" y="75" transform="rotate(20 200 75)"/>
    <use href="#picot" x="200" y="105" transform="rotate(160 200 105)"/>
    <use href="#picot" x="205" y="135" transform="rotate(15 205 135)"/>
    <use href="#picot" x="205" y="165" transform="rotate(165 205 165)"/>
    <use href="#picot" x="195" y="195" transform="rotate(30 195 195)"/>
    <use href="#picot" x="195" y="225" transform="rotate(150 195 225)"/>
    <use href="#picot" x="200" y="255" transform="rotate(20 200 255)"/>
    <use href="#picot" x="200" y="285" transform="rotate(160 200 285)"/>
    <use href="#picot" x="205" y="315" transform="rotate(15 205 315)"/>
    <use href="#picot" x="205" y="345" transform="rotate(165 205 345)"/>
    <use href="#picot" x="195" y="375" transform="rotate(30 195 375)"/>
    <use href="#picot" x="195" y="405" transform="rotate(150 195 405)"/>
    <use href="#picot" x="200" y="435" transform="rotate(20 200 435)"/>
    <use href="#picot" x="200" y="465" transform="rotate(160 200 465)"/>

    <!-- ④ 内部の直線/波線ステッチ（リボンを通すようなライン） -->
    <line x1="140" y1="0" x2="140" y2="480" stroke="rgba(120,120,120,0.9)" stroke-width="5"/>
    <line x1="145" y1="0" x2="145" y2="480" stroke="rgba(90,90,90,0.8)" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="135" y1="0" x2="135" y2="480" stroke="rgba(90,90,90,0.8)" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- コルセットの編み上げのようなジグザグライン -->
    <path d="M 120,0 L 140,20 L 120,40 L 140,60 L 120,80 L 140,100 L 120,120 L 140,140 L 120,160 L 140,180 L 120,200 L 140,220 L 120,240 L 140,260 L 120,280 L 140,300 L 120,320 L 140,340 L 120,360 L 140,380 L 120,400 L 140,420 L 120,440 L 140,460 L 120,480" fill="none" stroke="rgba(80,80,80,0.7)" stroke-width="2"/>

    <line x1="120" y1="0" x2="120" y2="480" stroke="rgba(120,120,120,0.9)" stroke-width="3"/>

    <!-- ⑤ メインの刺繍モチーフを配置 -->
    <!-- 花柄の曲線スクロールワークを連続配置 -->
    <use href="#scrollwork" x="80" y="0" />
    <use href="#scrollwork" x="80" y="160" />
    <use href="#scrollwork" x="80" y="320" />
    <use href="#scrollwork" x="80" y="480" />
    
    <!-- 花（薔薇）モチーフ -->
    <use href="#floral-motif" x="80" y="80" transform="scale(0.8) translate(20, 0)"/>
    <use href="#floral-motif" x="80" y="320" transform="scale(0.8) translate(20, 0)"/>

    <!-- 十字架モチーフ -->
    <use href="#cross-embroidered" x="80" y="200" transform="scale(0.9) translate(10, 0)"/>
    <use href="#cross-embroidered" x="80" y="440" transform="scale(0.9) translate(10, 0)"/>

    <!-- ⑥ 最も内側（左端）の太い縁取りと粗いネット -->
    <line x1="15" y1="0" x2="15" y2="480" stroke="rgba(120,120,120,0.9)" stroke-width="8"/>
    <line x1="25" y1="0" x2="25" y2="480" stroke="rgba(90,90,90,0.8)" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="32" y1="0" x2="32" y2="480" stroke="rgba(120,120,120,0.9)" stroke-width="4"/>
    
    <!-- 大きめのひし形チェーンステッチ -->
    <path d="M 50,0 L 40,20 L 50,40 L 40,60 L 50,80 L 40,100 L 50,120 L 40,140 L 50,160 L 40,180 L 50,200 L 40,220 L 50,240 L 40,260 L 50,280 L 40,300 L 50,320 L 40,340 L 50,360 L 40,380 L 50,400 L 40,420 L 50,440 L 40,460 L 50,480" fill="none" stroke="rgba(100,100,100,0.85)" stroke-width="2"/>
    <path d="M 40,0 L 50,20 L 40,40 L 50,60 L 40,80 L 50,100 L 40,120 L 50,140 L 40,160 L 50,180 L 40,200 L 50,220 L 40,240 L 50,260 L 40,280 L 50,300 L 40,320 L 50,340 L 40,360 L 50,380 L 40,400 L 50,420 L 40,440 L 50,460 L 40,480" fill="none" stroke="rgba(100,100,100,0.85)" stroke-width="2"/>

  </g>
</svg>
